        </select></label>

        </select></label>

          <option value="date">Newest First</option>

    </div>

<script src="app.js"></script>
<script>
let currentPage = 0;
const PAGE_SIZE = 50;

async function loadConfig() {
  try {
    const config = await apiFetch("GET", "/api/config");
    const catSel = document.getElementById("categoryFilter");
    const srcSel = document.getElementById("sourceFilter");
    (config.categories || []).forEach(c => {
      catSel.innerHTML += `<option value="${c.slug}">${c.name}</option>`;
    });
    Object.values(config.boards || {}).forEach(boards => {
      Object.entries(boards).forEach(([name, cfg]) => {
        if (cfg.enabled) srcSel.innerHTML += `<option value="${name}">${name}</option>`;
      });
    });
  } catch (err) {}
}

function filterStorageKey() {
  const user = getCurrentUser() || {};
  return `joblin_job_filters_${user.id || user.email || "anon"}`;
}

function getFilterValues() {
  return {
    search: document.getElementById("searchInput").value || "",
    category: document.getElementById("categoryFilter").value || "",
    source: document.getElementById("sourceFilter").value || "",
    graduate: document.getElementById("graduateFilter").value || "",
    applied: document.getElementById("appliedFilter").value || "",
    location: document.getElementById("locationFilter").value || "",
    sort: document.getElementById("sortOrder").value || "date",
  };
}

function applyFilterValues(values) {
  if (!values) return;
  if (values.search !== undefined) document.getElementById("searchInput").value = values.search || "";
  if (values.category !== undefined) document.getElementById("categoryFilter").value = values.category || "";
  if (values.source !== undefined) document.getElementById("sourceFilter").value = values.source || "";
  if (values.graduate !== undefined) document.getElementById("graduateFilter").value = values.graduate || "";
  if (values.applied !== undefined) document.getElementById("appliedFilter").value = values.applied || "";
  if (values.location !== undefined) document.getElementById("locationFilter").value = values.location || "";
  if (values.sort !== undefined) document.getElementById("sortOrder").value = values.sort || "date";
}

function loadSavedFilters() {
  try {
    const raw = localStorage.getItem(filterStorageKey());
    if (raw) applyFilterValues(JSON.parse(raw));
  } catch (e) {}
}

function saveFilters() {
  try {
    localStorage.setItem(filterStorageKey(), JSON.stringify(getFilterValues()));
  } catch (e) {}
}

function applyInitialFilters() {
  loadSavedFilters();
  const params = new URLSearchParams(window.location.search);
  const urlValues = {};
  ["search", "category", "source", "graduate", "applied", "location", "sort"].forEach(key => {
    if (params.has(key)) urlValues[key] = params.get(key) || "";
  });
  applyFilterValues(urlValues);
  return params;
}

function syncUrlParams() {
  const params = new URLSearchParams();
  const search = document.getElementById("searchInput").value;
  const category = document.getElementById("categoryFilter").value;
  const source = document.getElementById("sourceFilter").value;
  const graduate = document.getElementById("graduateFilter").value;
  const applied = document.getElementById("appliedFilter").value;
  const location = document.getElementById("locationFilter").value;
  const sort = document.getElementById("sortOrder").value;
  if (search) params.set("search", search);
  if (category) params.set("category", category);
  if (source) params.set("source", source);
  if (graduate) params.set("graduate", graduate);
  if (applied) params.set("applied", applied);
  if (location) params.set("location", location);
  if (sort && sort !== "date") params.set("sort", sort);
  const qs = params.toString();
  const url = qs ? `?${qs}` : window.location.pathname;
  window.history.replaceState(null, "", url);
  saveFilters();
}

async function loadJobs(page = 0) {
  currentPage = page;
  const search = document.getElementById("searchInput").value;
  const category = document.getElementById("categoryFilter").value;
  const source = document.getElementById("sourceFilter").value;
  const graduate = document.getElementById("graduateFilter").value || null;
  const applied = document.getElementById("appliedFilter").value || null;
  const location = document.getElementById("locationFilter").value || null;
  const sort = document.getElementById("sortOrder").value;
  const offset = page * PAGE_SIZE;

  syncUrlParams();

  document.getElementById("jobList").innerHTML = '<div class="empty-state"><div class="spinner spinner-lg"></div><p style="margin-top:12px">Loading jobs...</p></div>';

  try {
    let url = `/api/jobs?limit=${PAGE_SIZE}&offset=${offset}&sort=${sort}`;
    if (search) url += `&search=${encodeURIComponent(search)}`;
    if (category) url += `&category=${encodeURIComponent(category)}`;
    if (source) url += `&source=${encodeURIComponent(source)}`;
    if (graduate) url += `&is_graduate=${graduate}`;
    if (applied) url += `&applied=${applied}`;
    if (location) url += `&location=${location}`;

    const data = await apiFetch("GET", url);
    const jobs = data.jobs || [];

    document.getElementById("resultsStats").textContent = `${data.total} jobs found \u00b7 showing ${offset+1}-${Math.min(offset+PAGE_SIZE, data.total)}`;

    if (!jobs.length) {
      document.getElementById("jobList").innerHTML = '<div class="empty-state"><div class="empty-icon">&#128270;</div><h3>No jobs found</h3><p>Try different filters or scrape more boards.</p></div>';
      document.getElementById("pagination").innerHTML = "";
      return;
    }

    document.getElementById("jobList").innerHTML = jobs.map(j => renderJobItem(j, isNewJob(j))).join("");

    const totalPages = Math.ceil(data.total / PAGE_SIZE);
    let pHTML = "";
    if (page > 0) pHTML += `<button class="btn btn-secondary btn-sm" onclick="loadJobs(${page-1})">Prev</button>`;
    for (let i = Math.max(0, page-2); i < Math.min(totalPages, page+3); i++) {
      pHTML += `<button class="btn ${i===page?'btn-primary':'btn-secondary'} btn-sm" onclick="loadJobs(${i})">${i+1}</button>`;
    }
    if (page < totalPages-1) pHTML += `<button class="btn btn-secondary btn-sm" onclick="loadJobs(${page+1})">Next</button>`;
    document.getElementById("pagination").innerHTML = pHTML;
  } catch (err) {
    document.getElementById("jobList").innerHTML = `<div class="empty-state"><h3>Error</h3><p>${escHtml(err.message)}</p></div>`;
  }
}

async function exportExcel() {
  const btn = document.getElementById("exportBtn");
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Exporting...';
  try {
    const search = document.getElementById("searchInput").value;
    const category = document.getElementById("categoryFilter").value;
    const source = document.getElementById("sourceFilter").value;
    let url = `/api/export/excel`;
    const params = [];
    if (search) params.push(`search=${encodeURIComponent(search)}`);
    if (category) params.push(`category=${encodeURIComponent(category)}`);
    if (source) params.push(`source=${encodeURIComponent(source)}`);
    if (params.length) url += "?" + params.join("&");

    const token = getToken();
    const r = await fetch(API + url, { headers: { Authorization: `Bearer ${token}` } });
    if (!r.ok) { showToast("Export failed", "error"); return; }
    const blob = await r.blob();
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob); a.download = "joblin_jobs.xlsx"; a.click();
    URL.revokeObjectURL(a.href);
    showToast("Excel exported!");
  } catch (err) { showToast(err.message, "error"); }
  btn.disabled = false; btn.innerHTML = "Export Excel";
}

async function initJobsPage() {
  if (!getToken()) window.location.href = "login.html";
  updateHeader();
  await loadConfig();
  applyInitialFilters();
  loadJobs();
}

initJobsPage();
</script>
