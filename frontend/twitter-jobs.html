<div class="page-content tw-container">
<div class="page-header tw-header">
<div>
<h2>Twitter Posts</h2>
<p class="subtitle">Copy-paste ready job listings for Twitter. Mix of Nigerian and international roles.</p>
</div>
</div>

<div class="tw-controls">
<select id="jobCount"><option value="10">10 jobs</option><option value="15" selected>15 jobs</option><option value="20">20 jobs</option></select>
<select id="categoryFilter"><option value="">All categories</option></select>
<button class="tw-refresh-btn" onclick="loadJobs()">Refresh Jobs</button>
<button class="tw-copy-btn" id="copyBtn" onclick="copyTweet()">Copy to Clipboard</button>
</div>

<textarea class="tw-tweet-box" id="tweetBox" readonly placeholder="Loading jobs..."></textarea>
<div class="tw-preview-count" id="charCount">0 characters</div>
</div>
</div>
</div>

<script src="app.js"></script>
<script>
let currentJobs = [];

function escHtml(str) {
  const d = document.createElement('div');
  d.textContent = str || '';
  return d.innerHTML;
}

function truncate(text, len) {
  if (!text || text.length <= len) return text || '';
  return text.slice(0, len).replace(/\s+\S*$/, '') + '...';
}

function isJunkJob(job) {
  const junkTitles = /view profile|my saved|account.*privacy|update.*profile|sign in|log in|create.*account|page not found|error|loading/i;
  if (!job.title || junkTitles.test(job.title)) return true;
  if (!job.company && job.description && job.description.length < 20) return true;
  if (job.job_category === 'other' && (!job.description || job.description.length < 20)) return true;
  return false;
}

async function loadJobs() {
  const box = document.getElementById('tweetBox');
  box.value = 'Loading jobs...';
  try {
    const r = await fetch('/api/recent-jobs');
    if (!r.ok) { const err = await r.text().catch(() => ''); box.value = 'Failed to load jobs: ' + (err.slice(0, 200) || r.status); return; }
    const data = await r.json();
    currentJobs = data.jobs || [];
    const catFilter = document.getElementById('categoryFilter').value;
    const count = parseInt(document.getElementById('jobCount').value);
    let filtered = currentJobs;
    if (catFilter) filtered = filtered.filter(j => j.job_category === catFilter);
    filtered = filtered.filter(j => !isJunkJob(j));
    const selected = filtered.slice(0, count);
    if (selected.length === 0) {
      box.value = 'No recent jobs found.\n\nThis page shows jobs scraped from job boards. If no jobs appear:\n1. The system may still be scraping — check back later\n2. An admin can trigger a fresh scrape from the Dashboard\n3. Try a different category filter';
    } else {
      generateTweet(selected);
    }
    populateCategories(currentJobs);
  } catch (e) {
    box.value = 'Error: ' + e.message + '\n\nThe Twitter Posts page needs the job database. If the server just started, jobs may not be loaded yet.';
  }
}

function populateCategories(jobs) {
  const sel = document.getElementById('categoryFilter');
  const current = sel.value;
  const cats = [...new Set(jobs.map(j => j.job_category).filter(Boolean))];
  sel.innerHTML = '<option value="">All categories</option>' + cats.map(c => `<option value="${escHtml(c)}">${escHtml(c)}</option>`).join('');
  sel.value = current;
}

function generateTweet(jobs) {
  const box = document.getElementById('tweetBox');
  if (!jobs.length) { box.value = 'No jobs found for the selected category.'; return; }
  const siteUrl = window.location.origin;
  let lines = [];
  lines.push('NEW JOBS IN NIGERIA AND INTERNATIONAL');
  lines.push('Apply via Joblin - AI-powered CV tailoring for Nigerian job seekers');
  lines.push(siteUrl);
  lines.push('');
  jobs.forEach((j, i) => {
    const n = i + 1;
    const title = j.title || 'Untitled';
    const company = j.company || 'Unknown';
    const location = j.location ? ' ' + j.location : '';
    const category = j.job_category || '';
    const desc = truncate(j.description || '', 120);
    const jobUrl = j.url || (siteUrl + '/job-detail.html?id=' + j.id);
    lines.push(n + '. ' + title + ' - ' + company);
    if (location || category) {
      const tags = [];
      if (location) tags.push(location);
      if (category) tags.push(category);
      lines.push('   ' + tags.join(' | '));
    }
    if (desc) lines.push('   ' + desc);
    lines.push('   ' + jobUrl);
    lines.push('');
  });
  lines.push('Apply via Joblin - AI-powered CV tailoring for Nigerian job seekers');
  lines.push(siteUrl);
  box.value = lines.join('\n');
  document.getElementById('charCount').textContent = box.value.length + ' characters' + (box.value.length > 280 ? ' (thread: ' + Math.ceil(box.value.length / 280) + ' tweets)' : ' (1 tweet)');
}

async function copyTweet() {
  const box = document.getElementById('tweetBox');
  const btn = document.getElementById('copyBtn');
  try {
    await navigator.clipboard.writeText(box.value);
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy to Clipboard'; btn.classList.remove('copied'); }, 2000);
  } catch (e) {
    box.select();
    document.execCommand('copy');
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy to Clipboard'; btn.classList.remove('copied'); }, 2000);
  }
}

document.getElementById('jobCount').addEventListener('change', () => {
  const catFilter = document.getElementById('categoryFilter').value;
  const count = parseInt(document.getElementById('jobCount').value);
  let filtered = currentJobs;
  if (catFilter) filtered = filtered.filter(j => j.job_category === catFilter);
  generateTweet(filtered.slice(0, count));
});
document.getElementById('categoryFilter').addEventListener('change', () => {
  const catFilter = document.getElementById('categoryFilter').value;
  const count = parseInt(document.getElementById('jobCount').value);
  let filtered = currentJobs;
  if (catFilter) filtered = filtered.filter(j => j.job_category === catFilter);
  generateTweet(filtered.slice(0, count));
});

if (!getToken()) { window.location.href = 'login.html'; }
updateHeader();
loadJobs();
</script>
</body>
