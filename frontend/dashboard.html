<script src="app.js"></script>
<script>
async function loadStats() {
  try {
    const data = await apiFetch("GET", "/api/stats");
    const totalEl = document.getElementById("statTotal");
    const recentEl = document.getElementById("statRecent");
    const catCountEl = document.getElementById("statCategories");
    const srcCountEl = document.getElementById("statSources");
    animateNumber(totalEl, data.total || 0);
    animateNumber(recentEl, data.recent_24h || 0);
    catCountEl.textContent = Object.keys(data.by_category || {}).length;
    srcCountEl.textContent = Object.keys(data.by_source || {}).length;

    const catContainer = document.getElementById("categoryBreakdown");
    if (data.by_category && Object.keys(data.by_category).length) {
      const entries = Object.entries(data.by_category).sort((a,b) => b[1]-a[1]);
      const maxCount = entries[0][1];
      catContainer.innerHTML = '<div class="category-breakdown">' +
        entries.map(([cat, cnt]) => {
          const color = CATEGORY_COLORS[cat] || "#94a3b8";
          const name = CATEGORY_NAMES[cat] || cat;
          const pct = maxCount > 0 ? (cnt / maxCount * 100) : 0;
          return `<div class="category-chip" style="border:1px solid ${color}20">
            <div class="chip-bar" style="background:${color};width:${pct}%"></div>
            <span class="chip-count" style="color:${color}">${cnt}</span>
            <span class="chip-label">${escHtml(name)}</span>
          </div>`;
        }).join("") + '</div>';
    } else {
      catContainer.innerHTML = '<p style="color:#94a3b8;font-size:13px">No jobs available yet. Check back after the next update.</p>';
    }

    const lastCard = document.getElementById("lastScrapedCard");
    if (data.last_scraped) {
      lastCard.style.display = "flex";
      const ts = new Date(data.last_scraped.replace(" ", "T") + "Z");
      const now = new Date();
      const diffMs = now - ts;
      const diffMins = Math.floor(diffMs / 60000);
      let rel;
      if (diffMins < 1) rel = "Just now";
      else if (diffMins < 60) rel = diffMins + "m ago";
      else if (diffMins < 1440) rel = Math.floor(diffMins / 60) + "h ago";
      else rel = Math.floor(diffMins / 1440) + "d ago";
      document.getElementById("statLastScraped").textContent = rel;
      const newCount = data.new_24h || 0;
      document.getElementById("statLastScrapedLabel").textContent =
        newCount ? newCount + " new jobs" : "Last updated";
    }
  } catch (err) {
    showToast(err.message, "error");
  }
}

function animateNumber(el, target) {
  const start = parseInt(el.textContent) || 0;
  if (start === target) { el.textContent = target; return; }
  const duration = 600;
  const startTime = performance.now();
  function step(currentTime) {
    const elapsed = currentTime - startTime;
    const progress = Math.min(elapsed / duration, 1);
    const eased = 1 - Math.pow(1 - progress, 3);
    el.textContent = Math.round(start + (target - start) * eased);
    if (progress < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

async function loadCategories() {
  try {
    const config = await apiFetch("GET", "/api/config");
    const sel = document.getElementById("quickCategory");
    (config.categories || []).forEach(c => {
      const opt = document.createElement("option");
      opt.value = c.slug; opt.textContent = c.name;
      sel.appendChild(opt);
    });
  } catch (err) {}
}



if (!getToken()) window.location.href = "login.html";
updateHeader();

loadCategories();
</script>
