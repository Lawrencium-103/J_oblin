name: Keep Alive

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping HuggingFace Space to prevent sleep
        run: |
          curl -s -o /dev/null -w "%{http_code}" "${{ secrets.HF_SPACE_URL }}/api/health" --max-time 10
