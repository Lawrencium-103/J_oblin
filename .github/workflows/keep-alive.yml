name: Keep Alive

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render app to prevent sleep
        run: |
          curl -s -o /dev/null -w "%{http_code}" "https://joblin-hx5a.onrender.com/api/health" --max-time 10
