name: Cleanup Old Jobs

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger cleanup on HuggingFace Space
        run: |
          curl -s "${{ secrets.HF_SPACE_URL }}/api/cleanup?token=${{ secrets.JOBLIN_CRON_TOKEN }}" --max-time 30
