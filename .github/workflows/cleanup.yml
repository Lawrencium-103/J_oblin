name: Cleanup Old Jobs

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger cleanup on Render
        run: |
          curl -s "https://joblin-hx5a.onrender.com/api/cleanup?token=${{ secrets.JOBLIN_CRON_TOKEN }}" --max-time 30
